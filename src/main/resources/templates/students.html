<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head><title>Students</title></head>
    <body>
        <link rel="stylesheet" th:href="@{/css/style-admin.css}">
        <h1>Student List</h1>
        <a th:href="@{/admin/students/create}">Add New Student</a>
        <table border="1">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Actions</th>
            </tr>
            <tr th:each="student:${students}">
                <td th:text="${student.id}"></td>
                <td th:text="${student.name}"></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.department}"></td>
                <td><a th:href="@{/students/edit/{id}(id=${student.id})}">Edit</a>
                    <a th:href="@{/students/delete/{id}(id=${student.id})}" onclick="return confirm('Are you sure?')">Delete</td>
            </tr>
        </table>
        <br>
        <a th:href="@{/dashboard}">Back to Dashboard</a>
        
        <footer class="app-footer">
    © 2026 Prathita Kumar Madhusudhana - Student Management System
</footer>

    </body>
</html>
