<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Courses</title>
    </head>
    <body>
        <link rel="stylesheet" th:href="@{/css/style-admin.css}">
        <h1>Course list</h1>
        <a th:href="@{/courses/new}">Add New Course</a>
        
        <table border="1">
            <tr>
                <th>ID</th>
                <th>Course Name</th>
                <th>Faculty</th>
                <th>Credits</th>
                <th>Actions</th>
            </tr>
            <tr th:each="course:${courses}">
                <td th:text="${course.id}"></td>
                <td th:text="${course.courseName}"></td>
                <td th:text="${course.faculty}"></td>
                <td th:text="${course.credits}"></td>
                <td><a th:href="@{/courses/delete/{id}(id=${course.id})}" onclick="return confirm('Are you sure?')">Delete</a></td>
            </tr>
        </table>
        <br>
        <a th:href="@{/dashboard}">Back to Dashboard</a>
        <footer class="app-footer">
    © 2026 Prathita Kumar Madhusudhana - Student Management System
</footer>

    </body>
</html>
